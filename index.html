<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Clarity Tool</title>
    <meta
      name="description"
      content="Herramienta comunitaria para optimización de prompts y benchmark de modelos, impulsada por June API."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Prompt Clarity Tool</h1>

      <textarea id="promptInput" placeholder="Escribe tu prompt aquí..."></textarea>
      <button id="analyzeBtn">Analyze</button>

      <div id="scoreCard" class="score-card hidden"></div>
      <ul id="feedbackList"></ul>

      <h2>Improved Version</h2>
      <textarea id="improvedOutput" readonly></textarea>

      <footer style="margin-top: 20px; font-size: 13px; color: #666;">
        Powered by June API · Community-built tool by Erick Maita.
        <br />
        Built for prompt QA and model benchmarking.
        <br />
        <a href="https://askjune.ai" target="_blank" rel="noopener noreferrer">askjune.ai</a>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
